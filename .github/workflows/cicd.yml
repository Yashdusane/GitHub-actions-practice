name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: clone the code
        run: echo "Clonning the code"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build using Docker
        run: echo "Building the Docker"
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the code
        run: echo "Deploing the code"
  test:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: test the code
        run: echo "Testing the code"
